<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Builder</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/print.css" media="print" />
</head>

<body>
  <!-- Two panes: the editor (form inputs) and the live preview -->
  <main id="app">
    <section id="editor">
      <h2>Editor</h2>

      <button type="button" class="editor-btn export-btn" data-action="export-pdf">
        Export PDF
      </button>

      <button type="button" class="editor-btn danger-btn reset-btn" data-action="reset-resume">
        Reset Saved Resume
      </button>

      <p id="save-status" class="save-status">Saved locally</p>
      <p id="page-warning" class="page-warning" aria-live="polite"></p>

      <h3>Basics</h3>

      <div class="form-group">
        <label for="name-input">Name</label>
        <input id="name-input" class="basics-input" type="text" data-field="name" placeholder="Enter your full name" />
      </div>

      <div class="form-group">
        <label for="address-input">Address</label>
        <input id="address-input" class="basics-input" type="text" data-field="address"
          placeholder="Enter your address" />
      </div>

      <div class="form-group">
        <label for="city-state-input">City, State</label>
        <input id="city-state-input" class="basics-input" type="text" data-field="cityState"
          placeholder="Enter city and state" />
      </div>

      <div class="form-group">
        <label for="email-input">Email</label>
        <input id="email-input" class="basics-input" type="email" data-field="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label for="phone-input">Phone</label>
        <input id="phone-input" class="basics-input" type="text" data-field="phone"
          placeholder="Enter your phone number" />
      </div>

      <h3>Education</h3>
      <div id="education-editor"></div>

      <h3>Experience</h3>
      <div id="experience-editor"></div>

      <h3>Leadership &amp; Activities</h3>
      <div id="leadership-editor"></div>

      <h3>Skills &amp; Interests</h3>
      <div id="skills-editor"></div>
    </section>

    <section id="preview"></section>
  </main>

  <!-- type="module" lets us use import/export across our js files -->
  <script type="module" src="js/main.js"></script>
</body>

</html>
